# Joblantern — smoke-test stack with the address sub-agent + map widget.
#
# Brings up postgres, mcp-address (pointed at the public Nominatim service
# for the smoke test), and the main app. Verdicts that include a claimed
# office address get geocoded and the verdict page renders an OSM map
# centred on the result.
#
# Run with:
#   docker compose -f deploy/docker-compose.smoketest.yml up -d --build
#
# Host ports chosen to avoid colliding with other dev stacks already
# running on this machine.
name: joblantern-smoke

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: joblantern-smoke-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: joblantern
      POSTGRES_PASSWORD: joblantern
      POSTGRES_DB: joblantern
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5433:5432"
    volumes:
      - smoke-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joblantern -d joblantern"]
      interval: 5s
      timeout: 3s
      retries: 20

  mcp-address:
    build:
      context: ..
      dockerfile: cmd/mcp-address/Dockerfile
    image: joblantern/mcp-address:smoke
    container_name: joblantern-smoke-mcp-address
    restart: unless-stopped
    command: ["-transport=http", "-addr=:8082"]
    environment:
      # Public Nominatim — heavily rate-limited (1 req/sec) but fine for
      # a one-off smoke test. The User-Agent comes from internal/nominatim.
      NOMINATIM_URL: https://nominatim.openstreetmap.org
      OVERPASS_URL: https://overpass-api.de/api/interpreter
    ports:
      - "18082:8082"

  joblantern:
    build:
      context: ..
      dockerfile: cmd/joblantern/Dockerfile
    image: joblantern/joblantern:smoke
    container_name: joblantern-smoke-app
    restart: unless-stopped
    environment:
      JOBLANTERN_ADDR: ":8080"
      JOBLANTERN_ENV: development
      LOG_LEVEL: info
      DATABASE_URL: postgres://joblantern:joblantern@postgres:5432/joblantern?sslmode=disable
      SESSION_SECRET: smoke-test-session-secret-not-for-prod-32b=
      JOBLANTERN_BADGE_ISSUER: http://localhost:18080
      # Dial the in-network mcp-address container.
      MCP_ADDRESS_URL: http://mcp-address:8082/
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mcp-address:
        condition: service_started

volumes:
  smoke-pgdata:
    name: joblantern-smoke-pgdata

networks:
  default:
    name: joblantern-smoke-net
