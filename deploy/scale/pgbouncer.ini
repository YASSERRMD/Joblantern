; PgBouncer configuration recipe for Joblantern at scale.
; Wraps the primary Postgres and gives the app a single connection
; pool. Reduces backend connections by ~10x for the typical workload.
[databases]
joblantern = host=postgres-primary dbname=joblantern

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

auth_type   = scram-sha-256
auth_file   = /etc/pgbouncer/userlist.txt

pool_mode            = transaction
max_client_conn      = 8000
default_pool_size    = 80
min_pool_size        = 10
reserve_pool_size    = 20
server_idle_timeout  = 300
query_wait_timeout   = 60

; Joblantern uses prepared statements only behind transactions, so
; transaction-mode pooling is safe.
ignore_startup_parameters = extra_float_digits

stats_period         = 60
admin_users          = joblantern_admin
