# Joblantern — base development Docker Compose stack.
#
# Phase 02 builds a project-owned Postgres image that bundles Postgres 16 +
# PostGIS 3.4 + pgvector. pg_trgm, citext and uuid-ossp ship in postgresql-
# contrib (already installed by the postgis base image) and are enabled by
# migration 0001.
#
# Subsequent phases will extend this file with: Nominatim, Overpass, the
# joblantern app service, and one container per MCP server.

name: joblantern

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
      args:
        POSTGRES_VERSION: "16"
        POSTGIS_VERSION: "3.4"
        PGVECTOR_VERSION: "v0.8.0"
    image: joblantern/postgres:16-3.4-pgvector
    container_name: joblantern-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: joblantern
      POSTGRES_PASSWORD: joblantern
      POSTGRES_DB: joblantern
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joblantern -d joblantern"]
      interval: 5s
      timeout: 3s
      retries: 20

  mcp-hello:
    build:
      context: ..
      dockerfile: cmd/mcp-hello/Dockerfile
    image: joblantern/mcp-hello:dev
    container_name: joblantern-mcp-hello
    restart: unless-stopped
    command: ["-transport=http", "-addr=:8081"]
    ports:
      - "8081:8081"

  mcp-address:
    build:
      context: ..
      dockerfile: cmd/mcp-address/Dockerfile
    image: joblantern/mcp-address:dev
    container_name: joblantern-mcp-address
    restart: unless-stopped
    command: ["-transport=http", "-addr=:8082"]
    environment:
      NOMINATIM_URL: ${NOMINATIM_URL:-http://host.docker.internal:8088}
      OVERPASS_URL: ${OVERPASS_URL:-http://host.docker.internal:8089/api/interpreter}
    ports:
      - "8082:8082"

  mcp-streetview:
    build:
      context: ..
      dockerfile: cmd/mcp-streetview/Dockerfile
    image: joblantern/mcp-streetview:dev
    container_name: joblantern-mcp-streetview
    restart: unless-stopped
    command: ["-transport=http", "-addr=:8083"]
    environment:
      MAPILLARY_TOKEN: ${MAPILLARY_TOKEN:-}
    ports:
      - "8083:8083"

  mcp-registry:
    build:
      context: ..
      dockerfile: cmd/mcp-registry/Dockerfile
    image: joblantern/mcp-registry:dev
    container_name: joblantern-mcp-registry
    restart: unless-stopped
    command: ["-transport=http", "-addr=:8084"]
    environment:
      OPENCORPORATES_TOKEN: ${OPENCORPORATES_TOKEN:-}
    ports:
      - "8084:8084"

  mcp-domain:
    build:
      context: ..
      dockerfile: cmd/mcp-domain/Dockerfile
    image: joblantern/mcp-domain:dev
    container_name: joblantern-mcp-domain
    restart: unless-stopped
    command: ["-transport=http", "-addr=:8085"]
    ports:
      - "8085:8085"

  mcp-scam-db:
    build:
      context: ..
      dockerfile: cmd/mcp-scam-db/Dockerfile
    image: joblantern/mcp-scam-db:dev
    container_name: joblantern-mcp-scam-db
    restart: unless-stopped
    command: ["-transport=http", "-addr=:8086"]
    environment:
      DATABASE_URL: postgres://joblantern:joblantern@postgres:5432/joblantern?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8086:8086"

volumes:
  pgdata:
    name: joblantern-pgdata

networks:
  default:
    name: joblantern-net
