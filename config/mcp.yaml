# MCP server registry for the Joblantern agent.
#
# Each entry describes how the agent should connect to one MCP server.
# Production deployments override this file by mounting their own copy
# (or by setting JOBLANTERN_MCP_CONFIG to a different path).
#
# Schema:
#   servers:
#     - name:        canonical server id (matches `mcp.Implementation.Name`)
#       enabled:     bool; disabled servers are not dialled
#       transport:   "stdio" | "http"
#       command:     argv[0] for stdio transport (path or command-name)
#       args:        argv[1:] for stdio transport
#       url:         endpoint for http transport
#       env:         map of additional environment variables to inject
#       call_timeout: per-call timeout (Go duration string)
#       max_retries:  bounded retries on transient errors

servers:
  - name: joblantern.hello
    enabled: true
    transport: stdio
    command: mcp-hello
    call_timeout: 10s
    max_retries: 1

  - name: joblantern.address
    enabled: true
    transport: stdio
    command: mcp-address
    env:
      NOMINATIM_URL: http://localhost:8088
      OVERPASS_URL: http://localhost:8089/api/interpreter
    call_timeout: 30s
    max_retries: 2

  - name: joblantern.streetview
    enabled: true
    transport: stdio
    command: mcp-streetview
    call_timeout: 30s
    max_retries: 1

  - name: joblantern.registry
    enabled: true
    transport: stdio
    command: mcp-registry
    call_timeout: 30s
    max_retries: 2
