version: "2"
run:
  build-tags:
    - integration
  tests: true
output:
  formats:
    text:
      path: stdout
linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    gosec:
      excludes:
        - G104 # covered by errcheck
        - G101 # DSN default string flag, not a real credential
        - G118 # detached context in fire-and-forget verification goroutine is intentional
        - G404 # non-crypto sampling/jitter, not security-sensitive
        - G705 # output goes through html/template, which auto-escapes
        - G124 # locale cookie carries no secrets; Secure would break the plain-HTTP .onion surface
    govet:
      disable:
        - fieldalignment
        - shadow # noisy, not part of govet's default set
      enable-all: true
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      - linters:
          - revive
        path: cmd/
        text: package-comments
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/yasserrmd/joblantern
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
